services:
  postgres:
    image: "postgres:18"
    container_name: tcc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tcc
      POSTGRES_USER: tcc_user
      POSTGRES_PASSWORD: tcc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
